<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextDev Academy — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b0f;
      --teal: #ff6600;
      --teal-dim: rgba(78,201,176,0.12);
      --white: white;
      --muted: #ffffff;
      --border: rgba(78,201,176,0.12);
    }

    html, body {
      height: 100%;
      background: black;
      color: var(--white);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      opacity: 0.35;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      z-index: 1;
      padding: 40px;
      text-align: center;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.35em;
      color: var(--teal);
      text-transform: uppercase;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadein 0.8s ease 0.2s forwards;
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 50px;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadein 0.8s ease 0.4s forwards;
    }

    .logo .teal { color: var(--teal); }

    .academy {
      font-family: 'Orbitron', monospace;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.45em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 52px;
      opacity: 0;
      animation: fadein 0.8s ease 0.6s forwards;
    }

    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, var(--teal), transparent);
      margin: 0 auto 52px;
      opacity: 0;
      animation: fadein 0.8s ease 0.8s forwards;
    }

    .message {
      font-size: clamp(12px, 1.8vw, 15px);
      color: var(--muted);
      font-weight: 300;
      line-height: 1.9;
      max-width: 420px;
      margin-bottom: 52px;
      opacity: 0;
      animation: fadein 0.8s ease 1s forwards;
    }

    .message span {
      color: var(--white);
      font-weight: 400;
    }

    .form {
      display: flex;
      gap: 0;
      max-width: 380px;
      width: 100%;
      opacity: 0;
      animation: fadein 0.8s ease 1.2s forwards;
    }

    .form input {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: 0.5px solid var(--border);
      border-right: none;
      padding: 13px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }

    .form input::placeholder { color: var(--muted); }
    .form input:focus { border-color: rgba(78,201,176,0.4); }

    .form button {
      background: var(--teal);
      color: #080b0f;
      border: none;
      padding: 13px 20px;
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .form button:hover { opacity: 0.85; }

    .note {
      margin-top: 14px;
      font-size: 11px;
      color: var(--muted);
      opacity: 0;
      animation: fadein 0.8s ease 1.4s forwards;
    }

    .corner {
      position: fixed;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.12em;
      font-family: 'JetBrains Mono', monospace;
      opacity: 0;
      animation: fadein 0.8s ease 1.6s forwards;
    }

    .corner-tl { top: 28px; left: 32px; }
    .corner-br { bottom: 28px; right: 32px; }
    .corner-tl::before { content: '//'; color: var(--teal); margin-right: 6px; }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 12px;
      background: var(--teal);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes fadein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .success {
      display: none;
      font-size: 12px;
      color: var(--teal);
      margin-top: 14px;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="wrap">
  <div class="eyebrow">Coming Soon</div>

  <div class="logo">NEXT<span class="teal">DEV</span></div>
  <div class="academy">A C A D E M Y</div>



 



  <div class="corner corner-br">est. 2026</div>
</div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function Particle() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = Math.random() * 1.2 + 0.3;
    this.speedY = Math.random() * 0.3 + 0.1;
    this.opacity = Math.random() * 0.5 + 0.1;
    this.color = Math.random() > 0.7 ? '#4ec9b0' : '#e8edf2';
  }

  Particle.prototype.update = function() {
    this.y -= this.speedY;
    if (this.y < 0) { this.y = H; this.x = Math.random() * W; }
  };

  Particle.prototype.draw = function() {
    ctx.globalAlpha = this.opacity;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x, this.y, this.size, this.size);
  };

  for (let i = 0; i < 120; i++) particles.push(new Particle());

  function loop() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
  }

  resize();
  window.addEventListener('resize', resize);
  loop();

  function handleSubmit(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    document.querySelector('.form').style.display = 'none';
    document.querySelector('.note').style.display = 'none';
    document.getElementById('success').style.display = 'block';
    console.log('waitlist:', email);
  }
</script>

</body>
</html>
